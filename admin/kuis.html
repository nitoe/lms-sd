<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kelola Kuis — LMS SD</title>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    *{box-sizing:border-box;margin:0;padding:0;}
    :root{--blue:#3B82F6;--indigo:#6366F1;--green:#22C55E;--red:#EF4444;--bg:#F1F5F9;--white:#fff;--text:#1E293B;--muted:#64748B;--border:#E2E8F0;}
    body{font-family:'Nunito',sans-serif;background:var(--bg);min-height:100vh;}
    .topbar{background:linear-gradient(135deg,#3B82F6,#6366F1);padding:0 28px;height:60px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:0 2px 12px rgba(59,130,246,.3);}
    .topbar-left{display:flex;align-items:center;gap:16px;}
    .topbar a{color:rgba(255,255,255,.75);text-decoration:none;font-size:14px;font-weight:700;}
    .topbar a:hover{color:#fff;}
    .topbar h1{font-family:'Fredoka One',cursive;color:#fff;font-size:20px;}
    .btn-logout{background:rgba(255,255,255,.2);color:#fff;border:none;padding:7px 16px;border-radius:8px;font-family:'Nunito',sans-serif;font-weight:700;font-size:13px;cursor:pointer;}
    .container{max-width:1100px;margin:28px auto;padding:0 24px;}
    .page-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;flex-wrap:wrap;gap:12px;}
    .page-header h2{font-family:'Fredoka One',cursive;font-size:26px;color:var(--text);}
    .page-header p{font-size:13px;color:var(--muted);margin-top:2px;}
    .btn{padding:10px 20px;border:none;border-radius:10px;font-family:'Nunito',sans-serif;font-weight:700;font-size:14px;cursor:pointer;display:inline-flex;align-items:center;gap:6px;transition:all .2s;}
    .btn-primary{background:linear-gradient(135deg,var(--blue),var(--indigo));color:#fff;box-shadow:0 3px 10px rgba(59,130,246,.3);}
    .btn-primary:hover{transform:translateY(-1px);}
    .btn-danger{background:#FEF2F2;color:var(--red);border:1.5px solid #FECACA;}
    .btn-danger:hover{background:var(--red);color:#fff;}
    .btn-edit{background:#EFF6FF;color:var(--blue);border:1.5px solid #BFDBFE;}
    .btn-edit:hover{background:var(--blue);color:#fff;}
    .btn-sm{padding:6px 12px;font-size:12px;border-radius:8px;}
    .filter-bar{background:var(--white);border-radius:14px;padding:16px 20px;margin-bottom:20px;display:flex;align-items:center;gap:12px;flex-wrap:wrap;box-shadow:0 2px 8px rgba(0,0,0,.05);}
    .filter-bar label{font-size:13px;font-weight:700;color:var(--muted);}
    .filter-btn{padding:6px 14px;border:2px solid var(--border);border-radius:20px;background:#F8FAFC;font-family:'Nunito',sans-serif;font-size:13px;font-weight:700;color:var(--muted);cursor:pointer;transition:.2s;}
    .filter-btn.active,.filter-btn:hover{border-color:var(--blue);background:var(--blue);color:#fff;}

    /* KUIS CARDS */
    .kuis-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:16px;}
    .kuis-card{background:var(--white);border-radius:16px;box-shadow:0 2px 12px rgba(0,0,0,.06);overflow:hidden;transition:.2s;}
    .kuis-card:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(0,0,0,.1);}
    .kuis-card-top{background:linear-gradient(135deg,#FFF7ED,#FFEDD5);padding:18px 20px;}
    .kuis-card-top .badge{display:inline-block;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:800;background:#FED7AA;color:#9A3412;margin-bottom:8px;}
    .kuis-card-top h3{font-family:'Fredoka One',cursive;font-size:17px;color:var(--text);margin-bottom:6px;}
    .kuis-card-top .meta{font-size:12px;color:var(--muted);display:flex;gap:12px;}
    .kuis-card-footer{padding:12px 20px;border-top:1px solid var(--border);display:flex;gap:8px;}
    .empty-state{text-align:center;padding:60px 20px;color:var(--muted);grid-column:1/-1;}
    .empty-state div{font-size:48px;margin-bottom:12px;}
    .empty-state p{font-size:15px;font-weight:600;}

    /* MODAL */
    .modal-overlay{display:none;position:fixed;inset:0;background:rgba(15,23,42,.45);z-index:200;align-items:center;justify-content:center;backdrop-filter:blur(2px);}
    .modal-overlay.open{display:flex;}
    .modal{background:var(--white);border-radius:20px;width:100%;max-width:720px;margin:20px;max-height:92vh;overflow-y:auto;animation:modalIn .3s cubic-bezier(.34,1.56,.64,1);}
    @keyframes modalIn{from{opacity:0;transform:scale(.92) translateY(20px);}to{opacity:1;transform:scale(1) translateY(0);}}
    .modal-header{padding:22px 28px 16px;border-bottom:1.5px solid var(--border);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:var(--white);z-index:1;}
    .modal-header h3{font-family:'Fredoka One',cursive;font-size:20px;color:var(--text);}
    .modal-close{background:none;border:none;font-size:22px;cursor:pointer;color:var(--muted);}
    .modal-body{padding:24px 28px;}
    .modal-footer{padding:16px 28px 24px;display:flex;gap:10px;justify-content:flex-end;border-top:1.5px solid var(--border);position:sticky;bottom:0;background:var(--white);}
    .row-2{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
    .field{margin-bottom:16px;}
    .field label{display:block;font-size:13px;font-weight:700;color:var(--text);margin-bottom:6px;}
    .field input,.field select{width:100%;padding:11px 14px;border:2px solid var(--border);border-radius:10px;font-family:'Nunito',sans-serif;font-size:14px;color:var(--text);background:#F8FAFC;outline:none;transition:.2s;}
    .field input:focus,.field select:focus{border-color:var(--blue);background:#fff;}

    /* SOAL BUILDER */
    .soal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
    .soal-header h4{font-family:'Fredoka One',cursive;font-size:18px;color:var(--text);}
    .soal-list{display:flex;flex-direction:column;gap:14px;}
    .soal-item{background:#F8FAFC;border:1.5px solid var(--border);border-radius:14px;padding:18px;}
    .soal-item-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
    .soal-num{font-family:'Fredoka One',cursive;font-size:15px;color:var(--blue);}
    .soal-item input[type=text]{width:100%;padding:10px 14px;border:2px solid var(--border);border-radius:10px;font-family:'Nunito',sans-serif;font-size:14px;outline:none;background:#fff;transition:.2s;margin-bottom:10px;}
    .soal-item input[type=text]:focus{border-color:var(--blue);}
    .pilihan-list{display:flex;flex-direction:column;gap:8px;}
    .pilihan-row{display:flex;align-items:center;gap:8px;}
    .pilihan-label{font-family:'Fredoka One',cursive;font-size:16px;color:var(--muted);width:24px;text-align:center;flex-shrink:0;}
    .pilihan-row input[type=text]{flex:1;padding:9px 12px;border:2px solid var(--border);border-radius:8px;font-family:'Nunito',sans-serif;font-size:13px;outline:none;background:#fff;transition:.2s;}
    .pilihan-row input[type=text]:focus{border-color:var(--blue);}
    .radio-jawaban{width:18px;height:18px;accent-color:var(--green);cursor:pointer;flex-shrink:0;}
    .jawaban-hint{font-size:11px;color:var(--muted);text-align:right;margin-top:6px;}
    .btn-hapus-soal{background:none;border:none;font-size:18px;cursor:pointer;color:var(--muted);}
    .btn-hapus-soal:hover{color:var(--red);}
    .btn-tambah-soal{width:100%;padding:12px;border:2.5px dashed var(--border);border-radius:12px;background:transparent;font-family:'Nunito',sans-serif;font-weight:700;font-size:14px;color:var(--muted);cursor:pointer;transition:.2s;margin-top:4px;}
    .btn-tambah-soal:hover{border-color:var(--blue);color:var(--blue);background:#EFF6FF;}

    .toast{position:fixed;bottom:24px;right:24px;padding:14px 20px;border-radius:12px;font-weight:700;font-size:14px;color:#fff;z-index:300;transform:translateY(80px);opacity:0;transition:all .3s cubic-bezier(.34,1.56,.64,1);}
    .toast.show{transform:translateY(0);opacity:1;}
    .toast.success{background:#22C55E;} .toast.error{background:#EF4444;}
    .confirm-overlay{display:none;position:fixed;inset:0;background:rgba(15,23,42,.45);z-index:250;align-items:center;justify-content:center;backdrop-filter:blur(2px);}
    .confirm-overlay.open{display:flex;}
    .confirm-box{background:#fff;border-radius:16px;padding:28px;max-width:360px;width:calc(100% - 40px);text-align:center;}
    .confirm-box .icon{font-size:44px;margin-bottom:12px;}
    .confirm-box h4{font-family:'Fredoka One',cursive;font-size:20px;margin-bottom:8px;}
    .confirm-box p{font-size:14px;color:var(--muted);margin-bottom:20px;}
    .confirm-btns{display:flex;gap:10px;justify-content:center;}
    @media(max-width:640px){.row-2{grid-template-columns:1fr;}.container{padding:0 16px;}}
  </style>
</head>
<body>

<div class="topbar">
  <div class="topbar-left">
    <a href="dashboard.html">← Dashboard</a>
    <h1>✏️ Kelola Kuis</h1>
  </div>
  <button class="btn-logout" onclick="doLogout()">Keluar</button>
</div>

<div class="container">
  <div class="page-header">
    <div>
      <h2>Bank Soal & Kuis</h2>
      <p>Buat kuis pilihan ganda untuk setiap kelas dan mata pelajaran</p>
    </div>
    <button class="btn btn-primary" onclick="bukaModalTambah()">＋ Buat Kuis</button>
  </div>

  <div class="filter-bar">
    <label>Kelas:</label>
    <button class="filter-btn active" onclick="setKelasFilter(this,0)">Semua</button>
    <button class="filter-btn" onclick="setKelasFilter(this,1)">1</button>
    <button class="filter-btn" onclick="setKelasFilter(this,2)">2</button>
    <button class="filter-btn" onclick="setKelasFilter(this,3)">3</button>
    <button class="filter-btn" onclick="setKelasFilter(this,4)">4</button>
    <button class="filter-btn" onclick="setKelasFilter(this,5)">5</button>
    <button class="filter-btn" onclick="setKelasFilter(this,6)">6</button>
  </div>

  <div class="kuis-grid" id="kuis-grid">
    <div class="empty-state"><div>⏳</div><p>Memuat kuis...</p></div>
  </div>
</div>

<!-- MODAL KUIS -->
<div class="modal-overlay" id="modal-kuis">
  <div class="modal">
    <div class="modal-header">
      <h3 id="modal-judul">🎯 Buat Kuis Baru</h3>
      <button class="modal-close" onclick="tutupModal()">✕</button>
    </div>
    <div class="modal-body">
      <input type="hidden" id="edit-id">
      <div class="field">
        <label>Judul Kuis</label>
        <input type="text" id="input-judul" placeholder="cth: Kuis Matematika Bab 1 — Penjumlahan">
      </div>
      <div class="row-2">
        <div class="field">
          <label>Kelas</label>
          <select id="input-kelas">
            <option value="">-- Pilih --</option>
            <option value="1">Kelas 1</option><option value="2">Kelas 2</option>
            <option value="3">Kelas 3</option><option value="4">Kelas 4</option>
            <option value="5">Kelas 5</option><option value="6">Kelas 6</option>
          </select>
        </div>
        <div class="field">
          <label>Mata Pelajaran</label>
          <select id="input-mapel">
            <option value="">-- Pilih --</option>
            <option value="matematika">Matematika</option>
            <option value="ipa">IPA</option>
            <option value="ips">IPS</option>
            <option value="b.indonesia">Bahasa Indonesia</option>
            <option value="b.inggris">Bahasa Inggris</option>
            <option value="pkn">PKN</option>
            <option value="seni">Seni Budaya</option>
            <option value="pjok">PJOK</option>
          </select>
        </div>
      </div>

      <!-- SOAL BUILDER -->
      <div class="soal-header">
        <h4>📝 Daftar Soal</h4>
        <span id="jml-soal" style="font-size:13px;color:var(--muted)">0 soal</span>
      </div>
      <div class="soal-list" id="soal-list"></div>
      <button class="btn-tambah-soal" onclick="tambahSoal()">＋ Tambah Soal</button>
    </div>
    <div class="modal-footer">
      <button class="btn" style="background:#F1F5F9;color:var(--muted);" onclick="tutupModal()">Batal</button>
      <button class="btn btn-primary" id="btn-simpan" onclick="simpanKuis()">💾 Simpan Kuis</button>
    </div>
  </div>
</div>

<!-- KONFIRMASI HAPUS -->
<div class="confirm-overlay" id="confirm-hapus">
  <div class="confirm-box">
    <div class="icon">🗑️</div>
    <h4>Hapus Kuis?</h4>
    <p>Kuis "<strong id="judul-hapus"></strong>" dan semua soalnya akan dihapus permanen.</p>
    <div class="confirm-btns">
      <button class="btn" style="background:#F1F5F9;color:var(--muted);" onclick="tutupKonfirmasi()">Batal</button>
      <button class="btn btn-danger" onclick="konfirmasiHapus()">Ya, Hapus</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script type="module">
  import { db } from "../assets/js/firebase-config.js";
  import { guardAdmin, logout } from "../assets/js/auth.js";
  import {
    collection, getDocs, doc, addDoc, updateDoc, deleteDoc, query, orderBy
  } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  guardAdmin();
  window.doLogout = logout;

  let semuaKuis  = [];
  let soalList   = [];   // soal di modal yang sedang diedit
  let kelasFilter = 0;
  let hapusId     = null;

  function toast(msg, type="success") {
    const el = document.getElementById('toast');
    el.textContent = msg; el.className = `toast ${type} show`;
    setTimeout(()=>el.classList.remove('show'),3000);
  }

  /* ── Muat kuis ── */
  async function muatKuis() {
    try {
      const q    = query(collection(db,"kuis"), orderBy("kelas"), orderBy("judul"));
      const snap = await getDocs(q);
      semuaKuis  = snap.docs.map(d=>({id:d.id,...d.data()}));
      renderGrid();
    } catch(e) {
      document.getElementById('kuis-grid').innerHTML =
        `<div class="empty-state"><div>⚠️</div><p>Gagal memuat: ${e.message}</p></div>`;
    }
  }

  function renderGrid() {
    let data = semuaKuis;
    if (kelasFilter) data = data.filter(k=>k.kelas==kelasFilter);
    const grid = document.getElementById('kuis-grid');
    if (!data.length) {
      grid.innerHTML = `<div class="empty-state"><div>🎯</div><p>Belum ada kuis. Klik "Buat Kuis" untuk mulai!</p></div>`;
      return;
    }
    grid.innerHTML = data.map(k=>`
      <div class="kuis-card">
        <div class="kuis-card-top">
          <span class="badge">Kelas ${k.kelas} — ${k.mapel||''}</span>
          <h3>${k.judul}</h3>
          <div class="meta">
            <span>📝 ${(k.soal||[]).length} soal</span>
          </div>
        </div>
        <div class="kuis-card-footer">
          <button class="btn btn-edit btn-sm" onclick="window._editKuis('${k.id}')">✏️ Edit</button>
          <button class="btn btn-danger btn-sm" onclick="window._hapusKuis('${k.id}','${k.judul.replace(/'/g,"\\'")}')">🗑️ Hapus</button>
        </div>
      </div>
    `).join('');
  }

  window.setKelasFilter = (btn, val) => {
    document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active'); kelasFilter = val; renderGrid();
  };

  /* ── Soal builder ── */
  function renderSoalList() {
    const list = document.getElementById('soal-list');
    document.getElementById('jml-soal').textContent = soalList.length + ' soal';
    if (!soalList.length) { list.innerHTML=''; return; }
    list.innerHTML = soalList.map((s,i)=>`
      <div class="soal-item" id="soal-${i}">
        <div class="soal-item-header">
          <span class="soal-num">Soal ${i+1}</span>
          <button class="btn-hapus-soal" onclick="hapusSoal(${i})" title="Hapus soal">✕</button>
        </div>
        <input type="text" placeholder="Tulis pertanyaan di sini..." value="${s.pertanyaan||''}"
          oninput="updateSoal(${i},'pertanyaan',this.value)">
        <div class="pilihan-list">
          ${['A','B','C','D'].map((hrf,j)=>`
            <div class="pilihan-row">
              <span class="pilihan-label">${hrf}</span>
              <input type="text" placeholder="Pilihan ${hrf}" value="${(s.pilihan&&s.pilihan[j])||''}"
                oninput="updatePilihan(${i},${j},this.value)">
              <input type="radio" class="radio-jawaban" name="jawaban-${i}" value="${j}"
                ${s.jawaban===j?'checked':''} onchange="updateSoal(${i},'jawaban',${j})"
                title="Tandai sebagai jawaban benar">
            </div>
          `).join('')}
        </div>
        <div class="jawaban-hint">🟢 Klik lingkaran di kanan untuk menandai jawaban yang benar</div>
      </div>
    `).join('');
  }

  window.tambahSoal = () => {
    soalList.push({ pertanyaan:'', pilihan:['','','',''], jawaban:null });
    renderSoalList();
    // scroll ke soal baru
    setTimeout(()=>{
      const last = document.getElementById(`soal-${soalList.length-1}`);
      if(last) last.scrollIntoView({behavior:'smooth',block:'nearest'});
    },100);
  };

  window.hapusSoal = (i) => {
    soalList.splice(i,1); renderSoalList();
  };
  window.updateSoal = (i, field, val) => { soalList[i][field] = val; };
  window.updatePilihan = (i, j, val) => { soalList[i].pilihan[j] = val; };

  /* ── Buka modal ── */
  window.bukaModalTambah = () => {
    document.getElementById('modal-judul').textContent = '🎯 Buat Kuis Baru';
    document.getElementById('edit-id').value      = '';
    document.getElementById('input-judul').value  = '';
    document.getElementById('input-kelas').value  = '';
    document.getElementById('input-mapel').value  = '';
    soalList = [];
    renderSoalList();
    document.getElementById('modal-kuis').classList.add('open');
  };

  window._editKuis = (id) => {
    const k = semuaKuis.find(x=>x.id===id);
    if (!k) return;
    document.getElementById('modal-judul').textContent = '✏️ Edit Kuis';
    document.getElementById('edit-id').value      = id;
    document.getElementById('input-judul').value  = k.judul;
    document.getElementById('input-kelas').value  = k.kelas;
    document.getElementById('input-mapel').value  = k.mapel||'';
    soalList = JSON.parse(JSON.stringify(k.soal||[])); // deep copy
    renderSoalList();
    document.getElementById('modal-kuis').classList.add('open');
  };

  window.tutupModal = () => document.getElementById('modal-kuis').classList.remove('open');

  /* ── Simpan kuis ── */
  window.simpanKuis = async () => {
    const id    = document.getElementById('edit-id').value;
    const judul = document.getElementById('input-judul').value.trim();
    const kelas = parseInt(document.getElementById('input-kelas').value);
    const mapel = document.getElementById('input-mapel').value;

    if (!judul)          return toast('❌ Judul kuis belum diisi!','error');
    if (!kelas)          return toast('❌ Kelas belum dipilih!','error');
    if (!mapel)          return toast('❌ Mata pelajaran belum dipilih!','error');
    if (!soalList.length) return toast('❌ Tambahkan minimal 1 soal!','error');

    // Validasi soal
    for (let i=0; i<soalList.length; i++) {
      const s = soalList[i];
      if (!s.pertanyaan.trim()) return toast(`❌ Pertanyaan soal ${i+1} belum diisi!`,'error');
      if (s.pilihan.some(p=>!p.trim())) return toast(`❌ Semua pilihan soal ${i+1} harus diisi!`,'error');
      if (s.jawaban===null||s.jawaban===undefined) return toast(`❌ Pilih jawaban yang benar untuk soal ${i+1}!`,'error');
    }

    const btn = document.getElementById('btn-simpan');
    btn.disabled=true; btn.textContent='⏳ Menyimpan...';

    try {
      const data = { judul, kelas, mapel, soal: soalList, updatedAt: new Date().toISOString() };
      if (id) {
        await updateDoc(doc(db,"kuis",id), data);
        const idx = semuaKuis.findIndex(k=>k.id===id);
        if(idx!==-1) semuaKuis[idx]={...semuaKuis[idx],...data};
        toast('✅ Kuis berhasil diperbarui!');
      } else {
        data.createdAt = new Date().toISOString();
        const ref = await addDoc(collection(db,"kuis"), data);
        semuaKuis.push({id:ref.id,...data});
        toast('✅ Kuis berhasil disimpan!');
      }
      renderGrid(); tutupModal();
    } catch(e) { toast('❌ Gagal: '+e.message,'error'); }
    finally { btn.disabled=false; btn.textContent='💾 Simpan Kuis'; }
  };

  window._hapusKuis = (id, judul) => {
    hapusId = id;
    document.getElementById('judul-hapus').textContent = judul;
    document.getElementById('confirm-hapus').classList.add('open');
  };
  window.tutupKonfirmasi = () => document.getElementById('confirm-hapus').classList.remove('open');
  window.konfirmasiHapus = async () => {
    if (!hapusId) return;
    try {
      await deleteDoc(doc(db,"kuis",hapusId));
      semuaKuis = semuaKuis.filter(k=>k.id!==hapusId);
      renderGrid(); toast('🗑️ Kuis dihapus.'); tutupKonfirmasi();
    } catch(e) { toast('❌ Gagal: '+e.message,'error'); }
    hapusId = null;
  };

  document.getElementById('modal-kuis').addEventListener('click', e=>{
    if(e.target.id==='modal-kuis') tutupModal();
  });

  muatKuis();
</script>
</body>
</html>
