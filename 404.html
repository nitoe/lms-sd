<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Halaman Tidak Ditemukan — LMS SD</title>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
    body { font-family:'Nunito',sans-serif; background:#EEF6FF; min-height:100vh; display:flex; align-items:center; justify-content:center; }
    .card { background:#fff; border-radius:24px; padding:48px 40px; text-align:center; max-width:420px; margin:20px; box-shadow:0 8px 32px rgba(59,130,246,.12); animation:pop .5s cubic-bezier(.34,1.56,.64,1); }
    @keyframes pop { from{opacity:0;transform:scale(.85);} to{opacity:1;transform:scale(1);} }
    .emoji { font-size:80px; margin-bottom:16px; animation:bounce 2s ease infinite; }
    @keyframes bounce { 0%,100%{transform:translateY(0);} 50%{transform:translateY(-12px);} }
    h1 { font-family:'Fredoka One',cursive; font-size:28px; color:#1E293B; margin-bottom:8px; }
    p  { font-size:15px; color:#64748B; margin-bottom:28px; line-height:1.6; }
    .btn { display:inline-block; background:linear-gradient(135deg,#3B82F6,#6366F1); color:#fff; padding:13px 32px; border-radius:14px; font-family:'Fredoka One',cursive; font-size:18px; text-decoration:none; transition:.2s; box-shadow:0 4px 14px rgba(59,130,246,.3); }
    .btn:hover { transform:translateY(-2px); box-shadow:0 6px 18px rgba(59,130,246,.4); }
  </style>
</head>
<body>
  <div class="card">
    <div class="emoji">🗺️</div>
    <h1>Halaman Tidak Ditemukan!</h1>
    <p>Ups! Sepertinya halaman yang kamu cari tidak ada atau sudah dipindah. Tidak apa-apa, yuk kembali ke beranda!</p>
    <a class="btn" href="/lms-sd/">🏠 Kembali ke Beranda</a>
  </div>
</body>
</html>
